name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validation sweep
        run: |
          npm run validate:incidents
          npm run validate:stall-detection
          npm run validate:auto-remediation
          npm run validate:escalation
          npm run validate:automation-status
          npm run validate:operator-dashboard
          npm run validate:self-tests
          npm run validate:control-plane-seams
          npm run validate:operator-control-registration
          npm run validate:operator-control-behavior
